<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Custom sponsored affiliate poster</title>
  <desc id="desc">ReviewIntel affiliate poster for custom sponsored campaigns.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8fcff"/>
      <stop offset="0.52" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fff2d2"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" rx="64" fill="url(#bg)"/>
  <g transform="translate(100 108)">
    <rect width="148" height="148" rx="42" fill="#08b7a8"/>
    <text x="74" y="98" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="900" fill="#ffffff">RI</text>
  </g>
  <g transform="translate(100 320)">
    <text font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="900" letter-spacing="9" fill="#2356a3">SPONSORED</text>
    <text y="96" font-family="Arial, Helvetica, sans-serif" font-size="80" font-weight="900" fill="#06111f">Affiliate offer</text>
    <text y="166" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="900" fill="#087f8f">Advertise on ReviewIntel</text>
    <rect y="238" width="300" height="74" rx="37" fill="#08b7a8"/>
    <text x="150" y="287" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="900" fill="#ffffff">View offer</text>
  </g>
  <text x="100" y="820" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" fill="#64748b">Affiliate compensation does not affect ReviewIntel verdicts.</text>
</svg>
